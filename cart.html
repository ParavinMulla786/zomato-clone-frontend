<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Back Button -->
    <div class="container mt-3">
        <a href="./index.html" class="btn btn-outline-primary">⬅ Back to Home</a>
    </div>

    <h1 class="text-center mt-3">🛒 Cart</h1>

    <div class="container mt-4">
        <div class="row">
            <!-- Cart Items -->
            <div class="col-8" id="renderCart"></div>

            <!-- Summary -->
            <div class="col-4" id="summary"></div>
        </div>
    </div>

    <script>
        // 🔹 Get Cart Data from LocalStorage
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        // 🔹 Charges & Discount
        let deliveryCharges = 100;
        let flat5Per = 5;
        let platformCharges = 20;

        // 🔹 Calculate Actual Amount (after item discount)
        let actualAmount = cart.reduce((total, item) => {
            let discountedPrice = item.price - (item.price * (item.discount / 100));
            return total + (discountedPrice * item.quantity);
        }, 0);

        // 🔹 Apply extra 5% discount
        let discountAmount = actualAmount * (flat5Per / 100);
        let totalAfterDiscount = actualAmount - discountAmount;

        // 🔹 Final Total
        let grandTotal = totalAfterDiscount + deliveryCharges + platformCharges;

        // 🔹 Render Cart Items
        document.querySelector("#renderCart").innerHTML = cart.map((item, index) => `
            <div class="card mb-3 p-3">
                <div class="row">
                    <div class="col-8">
                        <h5>${item.name}</h5>

                        <p>
                            <button class="btn btn-success btn-sm" onclick="increaseQty(${index})">+</button>
                            ${item.quantity}
                            <button class="btn btn-danger btn-sm" onclick="decreaseQty(${index})">-</button>
                        </p>
                    </div>

                    <div class="col-4 text-end">
                        <p>₹${item.price}</p>
                    </div>
                </div>
            </div>
        `).join("");

        // 🔹 Render Summary
        document.querySelector("#summary").innerHTML = `
            <div class="card p-3">
                <h4>Summary</h4>
                <p>Total Products: ${cart.length}</p>

                <p>Actual Amount: ₹${actualAmount.toFixed(2)}</p>
                <p>Discount (5%): -₹${discountAmount.toFixed(2)}</p>

                <p>Delivery Charges: ₹${deliveryCharges}</p>
                <p>Platform Charges: ₹${platformCharges}</p>

                <hr>
                <h5>Grand Total: ₹${grandTotal.toFixed(2)}</h5>
            </div>
        `;

        // 🔹 Increase Quantity
        function increaseQty(index) {
            cart[index].quantity++;
            localStorage.setItem("cart", JSON.stringify(cart));
            location.reload();
        }

        // 🔹 Decrease Quantity
        function decreaseQty(index) {
            if (cart[index].quantity > 1) {
                cart[index].quantity--;
            } else {
                cart.splice(index, 1); // remove item
            }
            localStorage.setItem("cart", JSON.stringify(cart));
            location.reload();
        }

    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
