    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Zomato</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>

    <body>
        <nav class="navbar navbar-expand-lg " style="background-color: #f3a366;">
            <div class="container-fluid">
            <img src="image.png" alt="" class="logo">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="modal" data-bs-target="#forNewDishModal">Add New
                                Dish</button>
                        </li>
                    </ul>
                    <div>
                        <a href="./cart.html" class="nav-link">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <sup id="cartLength"></sup>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
        <div class="GradEffect">
            <video src="https://b.zmtcdn.com/data/file_assets/2627bbed9d6c068e50d2aadcca11ddbb1743095810.mp4" autoplay muted
                loop style="height: 500px; width: 100%; object-fit: cover;">
            </video>
        </div>

        <div class="container mt-3">
            <div class="row g-3" id="showDishes"></div>
        </div>


        <!-- Modal for new dish -->
        <div class="modal fade" id="forNewDishModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Add new Dish ... </h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="nameInput" placeholder="add dish name">
                                <label for="floatingInput">Add Dish Name</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="descriptionInput" placeholder="description">
                                <label for="descriptionInput">Description of Dish</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="number" class="form-control" id="priceInput" placeholder="price">
                                <label for="priceInput">Price of Dish</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="number" class="form-control" id="discountInput" placeholder="Discount">
                                <label for="discountInput">Discount </label>
                            </div>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="selectCategory" id="vegInput"
                                        value="veg">
                                    <label class="form-check-label" for="vegInput">VEG</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="selectCategory" id="nonvegInput"
                                        value="Non-veg">
                                    <label class="form-check-label" for="nonvegInput">NON-VEG</label>
                                </div>
                            </div>
                            <div>
                                <label for="selectRating">Rating</label>

                                <select name="selectRating" id="selectRating">
                                    <option value="">Select rating</option>

                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>

                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="addNewDish()">Add New Dish</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>

    </html>
